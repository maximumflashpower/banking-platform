services:
  api:
    build: .
    container_name: banking_api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      SERVICE_NAME: gateway-api
      PORT: 3000

      # kill switch stage 4A
      ACH_RAIL_ENABLED: "true"

      # Social DB (chat)
      DATABASE_URL: postgres://app:app@db:5432/social

      # Identity DB (users/sessions)
      IDENTITY_DATABASE_URL: postgres://app:app@db:5432/identity

      # Financial DB (ledger core / payments)
      FINANCIAL_DATABASE_URL: postgres://app:app@db:5432/financial_db

      # Case DB (stage 3d case management)
      CASE_DATABASE_URL: postgres://app:app@db:5432/case_db

    volumes:
      - .:/app
      - /app/node_modules
      - /app/services/gateway-api/node_modules
    depends_on:
      - db
    command: ["sh", "-lc", "until nc -z db 5432; do echo waiting for db; sleep 1; done; node services/gateway-api/src/index.js"]

  db:
    image: postgres:16-alpine
    container_name: banking_postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: social
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d social"]
      interval: 5s
      timeout: 3s
      retries: 30

volumes:
  pgdata: